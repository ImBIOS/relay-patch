name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build
        run: echo "no build step (PNPM runs TypeScript directly)"

      - name: Publish to npm (trusted publisher, OIDC)
        run: npm publish --access public
        env:
          NPM_CONFIG_PROVENANCE: true

  publish-github:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to GitHub Packages
        run: |
          pnpm publish \
            --provenance \
            --no-git-checks \
            --access public \
            --registry "https://npm.pkg.github.com"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    needs: [publish-npm]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-24.04
            artifact: relay-patch-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-24.04-arm
            artifact: relay-patch-linux-arm64
          - target: bun-darwin-x64
            os: macos-15-intel
            artifact: relay-patch-darwin-x64
          - target: bun-darwin-arm64
            os: macos-14
            artifact: relay-patch-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - name: Build binary
        run: |
          mkdir -p dist
          bun build --compile --target=${{ matrix.target }} --minify \
            --outfile=dist/${{ matrix.artifact }} ./src/cli.ts
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  attach-binaries:
    needs: [build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Compute SHA256SUMS
        run: (cd dist && sha256sum relay-patch-* > SHA256SUMS)
      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/relay-patch-linux-x64
            dist/relay-patch-linux-arm64
            dist/relay-patch-darwin-x64
            dist/relay-patch-darwin-arm64
            dist/SHA256SUMS

  update-homebrew-tap:
    needs: [attach-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ImBIOS/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Compute darwin-arm64 SHA256
        id: sha
        run: |
          SHA=$(sha256sum dist/relay-patch-darwin-arm64 | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/relay-patch.rb <<EOF
          class RelayPatch < Formula
            desc "Keep up-to-date upstream + your custom patches. Patches are intent, not diffs."
            homepage "https://github.com/ImBIOS/relay-patch"
            url "https://github.com/ImBIOS/relay-patch/releases/download/${VERSION}/relay-patch-darwin-arm64"
            version "${VERSION#v}"
            sha256 "${SHA}"
            license "MIT"

            depends_on arch: :arm64

            def install
              bin.install "relay-patch-darwin-arm64" => "relay-patch"
            end

            test do
              assert_match "relay-patch —", shell_output("#{bin}/relay-patch --help")
            end
          end
          EOF
      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/relay-patch.rb
          git commit -m "relay-patch ${VERSION}" || echo "No changes to commit"
          git push
