name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build
        run: echo "no build step (PNPM runs TypeScript directly)"

      - name: Publish to npm (trusted publisher, OIDC)
        run: npm publish --access public --provenance=true
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ""

  # NOTE: GitHub Packages requires scoped packages (@scope/name).
  # relay-patch is unscoped on npm; GitHub Packages is intentionally skipped.
  # To enable: scope package as @imbios/relay-patch and add a publish-github job.

  build-binaries:
    needs: [publish-npm]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-24.04
            artifact: relay-patch-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-24.04-arm
            artifact: relay-patch-linux-arm64
          - target: bun-darwin-x64
            os: macos-15-intel
            artifact: relay-patch-darwin-x64
          - target: bun-darwin-arm64
            os: macos-14
            artifact: relay-patch-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - name: Build binary
        run: |
          mkdir -p dist
          bun build --compile --target=${{ matrix.target }} --minify \
            --outfile=dist/${{ matrix.artifact }} ./src/cli.ts
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  attach-binaries:
    needs: [build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Compute SHA256SUMS
        run: (cd dist && sha256sum relay-patch-* > SHA256SUMS)
      - name: Attach binaries to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/relay-patch-linux-x64
            dist/relay-patch-linux-arm64
            dist/relay-patch-darwin-x64
            dist/relay-patch-darwin-arm64
            dist/SHA256SUMS

  update-homebrew-formula:
    needs: [attach-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Compute SHA256 for all platforms
        id: sha
        run: |
          echo "darwin_arm64=$(sha256sum dist/relay-patch-darwin-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_x64=$(sha256sum dist/relay-patch-darwin-x64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(sha256sum dist/relay-patch-linux-x64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum dist/relay-patch-linux-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Update Formula/relay-patch.rb in this repo
        env:
          VERSION: ${{ github.ref_name }}
          DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          DARWIN_X64: ${{ steps.sha.outputs.darwin_x64 }}
          LINUX_X64: ${{ steps.sha.outputs.linux_x64 }}
          LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
        run: |
          mkdir -p Formula
          cat > Formula/relay-patch.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          class RelayPatch < Formula
            desc "Keep up-to-date upstream + your custom patches. Patches are intent, not diffs."
            homepage "https://github.com/ImBIOS/relay-patch"
            version "${VERSION#v}"
            license "MIT"

            on_macos do
              on_intel do
                url "https://github.com/ImBIOS/relay-patch/releases/download/${VERSION}/relay-patch-darwin-x64"
                sha256 "${DARWIN_X64}"
              end
              on_arm do
                url "https://github.com/ImBIOS/relay-patch/releases/download/${VERSION}/relay-patch-darwin-arm64"
                sha256 "${DARWIN_ARM64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/ImBIOS/relay-patch/releases/download/${VERSION}/relay-patch-linux-x64"
                sha256 "${LINUX_X64}"
              end
              on_arm do
                url "https://github.com/ImBIOS/relay-patch/releases/download/${VERSION}/relay-patch-linux-arm64"
                sha256 "${LINUX_ARM64}"
              end
            end

            def install
              os_arch = if OS.mac? && Hardware::CPU.arm?
                "darwin-arm64"
              elsif OS.mac?
                "darwin-x64"
              elsif Hardware::CPU.arm?
                "linux-arm64"
              else
                "linux-x64"
              end
              bin.install "relay-patch-\#{os_arch}" => "relay-patch"
            end

            test do
              assert_match "relay-patch", shell_output("#{bin}/relay-patch --help")
            end
          end
          EOF
      - name: Commit formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add Formula/relay-patch.rb
          git commit -m "chore: update homebrew formula to ${VERSION}" || echo "No changes to commit"
          git push origin main
